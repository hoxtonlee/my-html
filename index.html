<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>丐幫電競</title>

<style>

body{
    font-family:"Microsoft JhengHei";
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

/* 標題 */
h1{
    font-size:32px;
}

/* 入口按鈕區 */
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,200px);
    gap:20px;
    justify-content:center;
    margin-top:40px;
}

/* 按鈕卡片 */
.card{
    background:#2563eb;
    padding:20px;
    border-radius:15px;
    font-size:20px;
    transition:0.2s;
}

.card:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

a{
    text-decoration:none;
    color:white;
}

/* 下方價格區 */
.price{
    margin-top:50px;
    font-size:18px;
}

/* 備註 */
.note{
    margin-top:10px;
    color:yellow;
}

</style>

</head>

<body>

<h1>選擇一番賞</h1>

<div class="menu">

<!-- 新增入口就在這裡 -->

<a href="一番賞7.html">
<div class="card">
🎁 一番賞7
</div>
</a>

</div>


<!-- 下方金額區 -->

<div class="price">

<p>💰 1抽：200元</p>
<p>💰 5抽：900元</p>

<div class="note">
📌 備註：抽出後不可退款
</div>

</div>

</body>
</html>
